<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: "Curriculum Vitae" }}</title>
<meta name="theme-color" content="#070a12">
<meta name="description" content="{{ site.description | strip_html | strip_newlines | truncate: 160 }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- favicons -->
<link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Open Graph / social preview -->
<meta property="og:type" content="profile">
<meta property="og:site_name" content="SkyShine — Fasai Utawan">
<meta property="og:title" content="{{ page.title | default: 'Curriculum Vitae' }} — Fasai Utawan">
<meta property="og:description" content="{{ site.description | strip_html | strip_newlines | truncate: 200 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/assets/images/og-cover.png' | absolute_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Fasai Utawan — Junior DevOps Engineer · AI Infrastructure">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: 'Curriculum Vitae' }} — Fasai Utawan">
<meta name="twitter:description" content="{{ site.description | strip_html | strip_newlines | truncate: 200 }}">
<meta name="twitter:image" content="{{ '/assets/images/og-cover.png' | absolute_url }}">
<script>
(function(){try{var m=localStorage.getItem("skyshine-theme")||"dark";var eff=m;if(m==="auto"){eff=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";}if(eff!=="light")eff="dark";document.documentElement.setAttribute("data-theme",eff);var mc=document.querySelector('meta[name="theme-color"]');if(mc)mc.setAttribute("content",eff==="light"?"#eceef6":"#070a12");}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a12; --ink:#eef1f8; --ink-2:#aeb6cc; --ink-3:#6b7390;
    --accent:#6366f1; --accent-3:#a5b0ff; --bd:rgba(120,134,200,.16);
    --btn-bg:transparent;
    --mono:"IBM Plex Mono",ui-monospace,monospace; --sans:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  :root[data-theme="light"]{
    --bg:#eceef6; --ink:#161a2b; --ink-2:#474e68; --ink-3:#7c849e;
    --accent:#4f46e5; --accent-3:#4338ca; --bd:rgba(60,70,130,.18);
    --btn-bg:rgba(255,255,255,.6);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  html.theme-switching *,html.theme-switching *::before,html.theme-switching *::after{transition:none !important;}
  a{color:var(--accent-3);text-decoration:none;}
  a:hover{text-decoration:underline;}

  .topbar{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;
    align-items:center;padding:16px 28px;background:var(--btn-bg);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--bd);}
  .topbar .home{font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;gap:9px;align-items:center;}
  .topbar .home:hover{text-decoration:none;color:var(--ink);}
  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .btn{font-family:var(--mono);font-size:12.5px;padding:9px 15px;border-radius:999px;
    border:1px solid var(--bd);color:var(--ink);background:transparent;cursor:pointer;
    transition:border-color .2s,background .2s;}
  .btn:hover{border-color:var(--accent);}
  .btn-p{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .tools{display:flex;align-items:center;gap:12px;}
  .theme-switch{display:inline-flex;align-items:center;gap:2px;padding:3px;border-radius:999px;
    border:1px solid var(--bd);background:var(--btn-bg);}
  .theme-seg{appearance:none;-webkit-appearance:none;border:0;cursor:pointer;width:32px;height:28px;
    border-radius:999px;display:grid;place-items:center;padding:0;background:transparent;color:var(--ink-3);
    transition:color .2s,background .2s;}
  .theme-seg svg{width:15px;height:15px;display:block;}
  .theme-seg:hover{color:var(--ink);}
  .theme-seg.active{color:#fff;background:var(--accent);}

  .sheet{max-width:880px;margin:36px auto;padding:0 28px 80px;}

  /* CV header */
  .cv-head{border-bottom:1px solid var(--bd);padding-bottom:26px;margin-bottom:8px;}
  .cv-head h1{font-family:var(--mono);font-weight:700;font-size:clamp(32px,6vw,52px);
    letter-spacing:-.02em;margin:0 0 8px;color:var(--ink);}
  .cv-head .role{font-family:var(--mono);color:var(--accent-3);font-size:16px;letter-spacing:.02em;}
  .cv-head .meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:16px;font-family:var(--mono);
    font-size:12.5px;color:var(--ink-3);}
  .cv-head .meta a{color:var(--ink-2);}

  /* ---- rendered markdown (cv.md) -------------------------- */
  .sheet h2{font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--accent-3);margin:38px 0 18px;display:flex;align-items:center;gap:12px;}
  .sheet h2::after{content:"";flex:1;height:1px;background:var(--bd);}
  .sheet h3{font-family:var(--mono);font-size:16px;color:var(--ink);margin:22px 0 2px;font-weight:600;}
  .sheet h4{font-family:var(--mono);font-size:14px;color:var(--ink);margin:16px 0 2px;font-weight:500;}
  .sheet p{color:var(--ink-2);max-width:70ch;margin:6px 0;}
  .sheet em{color:var(--ink-3);font-style:normal;font-family:var(--mono);font-size:12.5px;}
  .sheet strong{color:var(--ink);font-weight:600;}
  .sheet ul{margin:8px 0 0;padding-left:18px;color:var(--ink-2);}
  .sheet ul li{margin:3px 0;}
  .sheet hr{border:0;border-top:1px solid var(--bd);margin:28px 0;}
  .sheet a{color:var(--accent-3);}

  @media print{
    @page{margin:14mm;}
    body{background:#fff;color:#16181f;font-size:11pt;}
    .topbar{display:none;}
    .sheet{margin:0;max-width:none;padding:0;}
    a{color:#3b3fb0;}
    .cv-head .role,.sheet h2,.cv-head .dot{color:#4b4fcf;}
    .cv-head .meta,.cv-head h1,.sheet h3,.sheet h4,.sheet strong{color:#16181f;}
    .sheet p,.sheet ul,.sheet em{color:#33363f;}
    .sheet h2::after,.cv-head{border-color:#d7d9e4;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="home" href="{{ '/' | relative_url }}"><span class="dot"></span> ← Back to portfolio</a>
  <div class="tools">
    <div class="theme-switch" role="group" aria-label="Theme">
      <button class="theme-seg" data-theme="light" aria-label="Light theme" title="Light theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      </button>
      <button class="theme-seg" data-theme="dark" aria-label="Dark theme" title="Dark theme">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 14.8A8.5 8.5 0 0 1 9.2 3.5 7.5 7.5 0 1 0 20.5 14.8z"/></svg>
      </button>
      <button class="theme-seg" data-theme="auto" aria-label="Auto theme" title="Auto — follows your device">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 3.5a8.5 8.5 0 0 1 0 17z" fill="currentColor"/></svg>
      </button>
    </div>
    <button class="btn btn-p" onclick="window.print()">Download / Print PDF</button>
  </div>
</div>

<div class="sheet">
  <header class="cv-head">
    <h1>{{ site.title }}</h1>
    <div class="role">Junior DevOps Engineer · AI Infrastructure</div>
    <div class="meta">
      <a href="mailto:fasai.utawan@gmail.com">fasai.utawan@gmail.com</a>
      <a href="https://github.com/SkyShineTH" target="_blank" rel="noopener">github.com/SkyShineTH</a>
      <a href="https://www.linkedin.com/in/fasai-utawan/" target="_blank" rel="noopener">linkedin.com/in/fasai-utawan</a>
      <a href="{{ site.social_links.website | default: 'https://skyshine.online' }}" target="_blank" rel="noopener">skyshine.online</a>
    </div>
  </header>

  {{ content }}
</div>

<script>
(function(){
  var KEY="skyshine-theme";var root=document.documentElement;
  var mq=window.matchMedia?window.matchMedia("(prefers-color-scheme: light)"):null;
  var mode="dark";try{mode=localStorage.getItem(KEY)||"dark";}catch(e){}
  if(mode!=="light"&&mode!=="auto")mode="dark";
  function resolve(m){return m==="auto"?((mq&&mq.matches)?"light":"dark"):m;}
  function apply(){
    var eff=resolve(mode);root.classList.add("theme-switching");root.setAttribute("data-theme",eff);
    var meta=document.querySelector('meta[name="theme-color"]');
    if(meta)meta.setAttribute("content",eff==="light"?"#eceef6":"#070a12");
    document.querySelectorAll(".theme-seg").forEach(function(b){
      var on=b.dataset.theme===mode;b.classList.toggle("active",on);b.setAttribute("aria-pressed",String(on));
    });
    if(document.body)void document.body.offsetWidth;
    var clear=function(){root.classList.remove("theme-switching");};
    requestAnimationFrame(function(){requestAnimationFrame(clear);});setTimeout(clear,80);
  }
  function set(m){mode=m;try{localStorage.setItem(KEY,m);}catch(e){}apply();}
  document.querySelectorAll(".theme-seg").forEach(function(b){b.addEventListener("click",function(){set(b.dataset.theme);});});
  if(mq){var f=function(){if(mode==="auto")apply();};if(mq.addEventListener)mq.addEventListener("change",f);else if(mq.addListener)mq.addListener(f);}
  apply();
})();
</script>

</body>
</html>
