<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #525659;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .cv-container {
            width: 210mm;
            min-height: 297mm;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            color: #333;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1a365d;
            --secondary-color: #2d3748;
            --accent-color: #4a5568;
            --text-body: #2d3748;
            --border-line: #e2e8f0;
            --highlight-bg: #f7fafc;
        }

        .header-section {
            background-color: var(--primary-color);
            color: white;
            padding: 35px 40px;
        }

        h1 {
            font-size: 28pt;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .subtitle {
            color: #e2e8f0;
            font-size: 11pt;
            margin-bottom: 15px;
        }

        .contact-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 10pt;
            margin-top: 12px;
            color: #e2e8f0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .contact-item a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .contact-item a:hover {
            border-color: white;
        }

        .content-body {
            padding: 30px 40px;
        }

        .content-body h2 {
            font-size: 14pt;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-line);
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        /* Special styling for Professional Summary */
        .content-body h2:first-of-type + p {
            background-color: var(--highlight-bg);
            padding: 12px 15px;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            font-size: 10pt;
            line-height: 1.6;
            color: var(--text-body);
            margin-bottom: 20px;
        }

        .content-body h3 {
            font-weight: 700;
            color: #2d3748;
            font-size: 11pt;
            margin-top: 12px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        /* Date badges in headers */
        .content-body h3 em {
            font-style: normal;
            font-size: 9pt;
            font-weight: 500;
            color: var(--accent-color);
            background-color: #f7fafc;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #edf2f7;
            white-space: nowrap;
        }

        .content-body p {
            font-size: 10pt;
            line-height: 1.5;
            color: var(--text-body);
            margin-bottom: 8px;
        }

        .content-body li {
            font-size: 10pt;
            line-height: 1.5;
            color: var(--text-body);
        }

        .content-body ul {
            margin-top: 6px;
            margin-bottom: 14px;
            padding-left: 18px;
            list-style-type: disc;
        }

        .content-body li {
            margin-bottom: 4px;
        }

        .content-body strong {
            font-weight: 700;
            color: var(--primary-color);
        }

        .content-body em {
            font-style: italic;
            color: #4a5568;
        }

        .content-body hr {
            border: none;
            border-top: 1px solid var(--border-line);
            margin: 20px 0;
        }

        .content-body a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .content-body a:hover {
            text-decoration: underline;
        }

        /* Project/Experience item spacing */
        .content-body h3 + p + ul {
            margin-top: 6px;
        }

        /* Technology tags styling */
        .content-body h3 + p em {
            font-size: 9pt;
            color: #6b7280;
            font-style: italic;
        }

        .print-button {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            background-color: #1e3a8a;
            color: white;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .print-button:hover {
            background-color: #1e40af;
            transform: scale(1.05);
        }

        @media print {
            body {
                background: none;
                padding: 0;
            }
            .cv-container {
                box-shadow: none;
                margin: 0;
                width: 100%;
                min-height: auto;
            }
            .print-button {
                display: none !important;
            }
            .header-section {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Ensure Professional Summary background prints */
            .content-body h2:first-of-type + p {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            a {
                text-decoration: none;
                color: inherit;
            }
            .content-body h2 {
                page-break-after: avoid;
                margin-top: 20px;
            }
            .content-body h3 {
                page-break-after: avoid;
            }
            /* Prevent breaking items */
            .content-body ul {
                page-break-inside: avoid;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
                background-color: white;
            }
            .cv-container {
                width: 100%;
                box-shadow: none;
            }
            .print-button {
                top: 10px;
                right: 10px;
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button onclick="window.print()" class="print-button">
        <i class="fas fa-file-pdf fa-lg"></i>
        <span>Save as PDF</span>
    </button>

    <div class="cv-container">
        <header class="header-section">
            <h1>Fasai Utawan</h1>
            <p class="subtitle">Bachelor of Science in Data Science and Software Innovation</p>
            
            <div class="contact-row">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:fasai.utawan@gmail.com">fasai.utawan@gmail.com</a>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+66 9432 86466</span>
                </div>
                <div class="contact-item">
                    <i class="fab fa-linkedin"></i>
                    <a href="https://www.linkedin.com/in/fasai-utawan/" target="_blank">LinkedIn</a>
                </div>
                <div class="contact-item">
                    <i class="fab fa-github"></i>
                    <a href="https://github.com/SkyShineTH" target="_blank">github.com/SkyShineTH</a>
                </div>
                <div class="contact-item">
                    <i class="fas fa-globe"></i>
                    <a href="https://skyshineth.github.io" target="_blank">skyshineth.github.io</a>
                </div>
            </div>
        </header>

        <div class="content-body">
            {{ content }}
        </div>
    </div>
</body>
</html>
